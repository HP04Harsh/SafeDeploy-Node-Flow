name: Trigger Jenkins Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Jenkins
        run: |
          curl -X POST "http://${{ secrets.JENKINS_URL }}/job/DevOps-Mega-Project/build?token=${{ secrets.JENKINS_TOKEN }}" \
          --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_API_TOKEN }}"